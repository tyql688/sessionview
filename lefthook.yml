# Git hooks for cc-session (JS + Rust). Installed via the `prepare` npm script.
# Hooks give fast local feedback; CI (.github/workflows/ci.yml) remains the
# authoritative gate. Bypass a hook with `git commit/push --no-verify`.

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "src/**/*.{ts,tsx,css}"
      # --no-errors-on-unmatched: a commit touching only biome-ignored files
      # (e.g. *.test.* which biome.json excludes) must not fail the hook.
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    eslint:
      glob: "src/**/*.{ts,tsx}"
      run: npx eslint {staged_files}

pre-push:
  parallel: false
  commands:
    frontend-check:
      run: npm run check
    frontend-tests:
      run: npm test
    rust-fmt:
      root: "src-tauri/"
      run: cargo fmt --check
    rust-clippy:
      root: "src-tauri/"
      run: cargo clippy --all-targets --all-features -- -D warnings
    rust-tests:
      root: "src-tauri/"
      run: cargo test
